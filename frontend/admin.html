<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal</title>
    <link rel="stylesheet" href="css/general.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/card.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <script src="utils/auth-guard.js" type="module"></script>
  </head>

  <body>
    <header>
      <div class="left-section">
        <img
          style="cursor: pointer"
          src="icons/hamburger-menu.svg"
          alt="Menu"
        />
      </div>
      <div class="middle-section">Admin Dashboard</div>
      <div class="right-section">
        <span class="user-name">Welcome, <b>Admin</b></span>
      </div>
    </header>

    <nav class="sidebar">
      <a class="sidebar-content" href="students.html">
        <img src="icons/student.svg" alt="Students" />
        <div>Students</div>
      </a>
      <a class="sidebar-content" href="faculties.html">
        <img src="icons/teacher.svg" alt="Faculty" />
        <div>Faculties</div>
      </a>
      <div class="sidebar-content">
        <img src="icons/courses.svg" alt="Courses" />
        <div>Branch</div>
      </div>
      <div class="sidebar-content logout-btn">
        <img src="icons/logout-black.svg" alt="Logout" />
        <div>Log out</div>
      </div>
    </nav>

    <main>
      <section class="home-cards">
        <a href="students.html" class="link-card">
          <p class="sub-title">Students</p>
          <p class="title" id="studentCount">0</p>
        </a>


        <a href="faculties.html" class="link-card">
          <p class="sub-title">Faculties</p>
          <p class="title" id="facultyCount">0</p>
        </a>

        <div class="link-card">
          <p class="sub-title">Branch</p>
          <p class="title">58</p>
        </div>

        <div class="link-card">
          <p class="sub-title">Live sessions</p>
          <p class="title" id="liveSessionCount">0</p>
        </div>
      </section>

      <section class="activities">
        <p>Activities</p>
        <div>
          <!-- Recent activities will be listed here -->
          <ul>
            <li>✔️ Attendance finalised for CSE101, 10:22 AM</li>
            <li>➕ Student added: Yash Sharma</li>
            <li>🕒 Session started for DBMS, Faculty: Mukesh Rathor</li>
          </ul>
        </div>
      </section>
    </main>

    <script type="module">
  import { getCurrentUser, logout } from '/utils/storage.js';

  document.querySelector('.user-name b').textContent =
    getCurrentUser().name || 'Admin';

  document.querySelector('.logout-btn').addEventListener('click', () => logout());

  async function getStats() {
    const response = await fetch('/api/admin/stats');
    const data = await response.json();

    if (!data.ok) {
      console.error(data.error);
      return;
    }

    document.getElementById('studentCount').textContent = data.stats.students;
    document.getElementById('facultyCount').textContent = data.stats.faculty;
    document.getElementById('liveSessionCount').textContent = data.stats.liveSessions;
  }

  getStats();
</script>
  </body>
</html>
